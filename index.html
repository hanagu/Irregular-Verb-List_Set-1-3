<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irregular Verb Conjugation Practice</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Load Inter Font, Noto Sans KR, SC, JP for multilingual support */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans KR', 'Noto Sans SC', 'Noto Sans JP', sans-serif;
        }

        /* Styles for 3D flip effect */
        .card-container {
            perspective: 1000px; /* Perspective for 3D effect */
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.7s;
            transform-style: preserve-3d;
        }

        /* Flip the card 180 degrees on the Y-axis when 'is-flipped' class is added */
        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden; /* Safari */
            backface-visibility: hidden; /* Hide the back side */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 1.5rem; /* 24px */
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            padding: 1.5rem; /* Adjusted padding for more content */
        }

        .card-front {
            background-color: #DBEAFE; /* Blue-100 for clarity */
            color: #111827; /* gray-900 */
        }

        .card-back {
            background-color: #1F2937; /* Dark gray for high contrast */
            color: white;
            transform: rotateY(180deg); /* Pre-rotate the back side */
            padding: 2rem; /* Ensure generous padding on the back */
        }
    </style>
</head>

                <div class="card-back">

                        <!-- Past Participle -->
                        <p class="text-lg font-medium text-gray-300">Past Participle</p>
                        <h2 id="back-pp" class="text-3xl md:text-4xl font-extrabold text-white break-all"></h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- Card Counter -->
        <div id="card-counter" class="text-center text-gray-600 mt-4 text-lg font-medium">

        </div>

        <!-- Navigation Buttons -->
        <div class="flex justify-between mt-6 space-x-4">
            <button id="prev-btn" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-3 px-6 rounded-lg shadow transition-colors duration-200">

            <button id="next-btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow transition-colors duration-200">

        </div>
    </div>

            { english: "run", past: "ran", pp: "run", korean: "달리다", mandarin: "跑 (pǎo)", japanese: "走る (hashiru)" },

        let currentCardIndex = 0;
        let shuffledVocabulary = [...vocabulary]; // Clone the original array

        // Get DOM elements
        const cardContainer = document.getElementById('flashcard-container');
        
        // Card Front Elements (Original Verb + Translations)
        const frontEnglishEl = document.getElementById('front-english-word');
        const koreanWordEl = document.getElementById('korean-word');
        const mandarinWordEl = document.getElementById('mandarin-word');
        const japaneseWordEl = document.getElementById('japanese-word');
        
        // Card Back Element (Conjugations) - NEW REFERENCES
        const backOriginalEl = document.getElementById('back-original');
        const backPastEl = document.getElementById('back-past');
        const backPpEl = document.getElementById('back-pp');

        const cardCounterEl = document.getElementById('card-counter');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');

        // Function to load card content
        function loadCard(index) {
            if (index < 0 || index >= shuffledVocabulary.length) return;

            currentCardIndex = index;
            const cardData = shuffledVocabulary[index];

            // Card Front (Original Verb + Translations)
            frontEnglishEl.textContent = cardData.english;
            koreanWordEl.textContent = cardData.korean;
            mandarinWordEl.textContent = cardData.mandarin;
            japaneseWordEl.textContent = cardData.japanese;
            
            // Card Back (Conjugations: Original - Past - Participle)
            // Set content to lowercase as requested
            backOriginalEl.textContent = cardData.english.toLowerCase();
            backPastEl.textContent = cardData.past.toLowerCase();
            backPpEl.textContent = cardData.pp.toLowerCase();

            // Update counter 
            cardCounterEl.textContent = `Card ${index + 1} / ${shuffledVocabulary.length}`;

            // Reset card to front face
            cardContainer.classList.remove('is-flipped');
        }

        // Function to flip card
        function flipCard() {
            cardContainer.classList.toggle('is-flipped');
        }

        // Show next card
        function nextCard() {
            const nextIndex = (currentCardIndex + 1) % shuffledVocabulary.length;
            loadCard(nextIndex);
        }

        // Show previous card
        function prevCard() {
            const prevIndex = (currentCardIndex - 1 + shuffledVocabulary.length) % shuffledVocabulary.length;
            loadCard(prevIndex);
        }

        // Shuffle cards (Fisher-Yates algorithm)
        function shuffleCards() {
            let m = shuffledVocabulary.length, t, i;

            // While there remain elements to shuffle
            while (m) {
                // Pick a remaining element
                i = Math.floor(Math.random() * m--);

                // And swap it with the current element
                t = shuffledVocabulary[m];
                shuffledVocabulary[m] = shuffledVocabulary[i];
                shuffledVocabulary[i] = t;
            }
            
            // Reset to the first card after shuffling
            loadCard(0);
        }

        // Event Listeners
        cardContainer.addEventListener('click', flipCard);
        nextBtn.addEventListener('click', nextCard);
        prevBtn.addEventListener('click', prevCard);
        shuffleBtn.addEventListener('click', shuffleCards);

        // On page load, shuffle and display the first card
        shuffleCards();
        loadCard(0);
    </script>
